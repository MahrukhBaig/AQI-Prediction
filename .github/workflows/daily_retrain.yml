name: Daily AQI Model Retraining

on:
  schedule:
    - cron: '0 03 * * *'
  workflow_dispatch:

jobs:
  retrain-models:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          pip install --no-cache-dir -r requirements.txt

      - name: Feature engineering
        env:
          HOPSWORKS_API_KEY: ${{ secrets.HOPSWORKS_API_KEY }}
        run: python Src/feature_engineering.py

      - name: Train XGBoost model
        env:
          HOPSWORKS_API_KEY: ${{ secrets.HOPSWORKS_API_KEY }}
          TUNE_XGBOOST: 'n'
        run: python Src/train_xgboost.py

      - name: Train Random Forest model
        env:
          HOPSWORKS_API_KEY: ${{ secrets.HOPSWORKS_API_KEY }}
        run: python Src/train_model.py

      - name: Train LSTM model
        env:
          HOPSWORKS_API_KEY: ${{ secrets.HOPSWORKS_API_KEY }}
        run: python Src/train_lstm.py
