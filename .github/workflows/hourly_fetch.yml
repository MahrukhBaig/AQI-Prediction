name: Hourly AQI Data Fetch

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

jobs:
  fetch-and-upload:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      
      - name: Install dependencies
        run: |
          pip install openmeteo-requests pandas requests_cache retry-requests python-dotenv
          pip install hopsworks==4.7.*
          pip install pyarrow
      
      - name: Run hourly fetch to Hopsworks
        env:
          HOPSWORKS_API_KEY: ${{ secrets.HOPSWORKS_API_KEY }}
        run: python Src/hourly_fetch_hopsworks.py